name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Build backend
        working-directory: backend
        run: dotnet build --no-restore -c Release

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Publish backend
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: dotnet publish src/GestorAI.API -c Release --no-restore -o ../publish/backend

      - name: Copy frontend dist to publish
        if: github.ref == 'refs/heads/main'
        run: cp -r frontend/dist publish/frontend

      - name: Build migration bundle
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          dotnet tool restore
          dotnet restore src/GestorAI.API/GestorAI.API.csproj -r linux-x64
          dotnet ef migrations bundle \
            --project src/GestorAI.API/GestorAI.API.csproj \
            --output ../publish/migrate \
            --self-contained \
            --runtime linux-x64 \
            --force

      - name: Upload artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: publish
          retention-days: 7

      - name: Deploy to production
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        run: |
          curl -sf -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${{ github.sha }}\"}" \
            https://gestor.quantixai.cloud/internal/deploy-hook
