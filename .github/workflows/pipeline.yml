name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Build backend
        working-directory: backend
        run: dotnet build --no-restore -c Release

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Publish backend
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: dotnet publish src/GestorAI.API -c Release --no-restore -o ../publish/backend

      - name: Copy frontend dist to publish
        if: github.ref == 'refs/heads/main'
        run: cp -r frontend/dist publish/frontend

      - name: Build migration bundle
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          dotnet tool restore
          dotnet ef migrations bundle \
            --project src/GestorAI.API/GestorAI.API.csproj \
            --output ../publish/migrate \
            --self-contained \
            --runtime linux-x64 \
            --force

      - name: Upload artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: publish
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: ./publish

      - name: Set permissions
        run: chmod +x ./publish/migrate

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync backend
        run: |
          rsync -az --delete -e ssh \
            ./publish/backend/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/

      - name: Sync frontend
        run: |
          rsync -az --delete -e ssh \
            ./publish/frontend/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_FRONTEND_PATH }}/

      - name: Run migrations
        run: |
          rsync -az -e ssh ./publish/migrate \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/gestorai-migrate
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chmod +x /tmp/gestorai-migrate && set -a && . ${{ secrets.VPS_ENV_FILE }} && set +a && /tmp/gestorai-migrate"

      - name: Restart service
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo systemctl restart ${{ secrets.VPS_SERVICE_NAME }}"

      - name: Verify
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sleep 3 && systemctl is-active --quiet ${{ secrets.VPS_SERVICE_NAME }}"
